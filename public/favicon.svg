<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Shuttlecock feathers -->
  <g fill="#f76a01" opacity="0.8">
    <!-- Feather left -->
    <path d="M 20 20 Q 18 28 20 35 Q 22 28 24 20 Z"/>
    <!-- Feather right -->
    <path d="M 44 20 Q 46 28 44 35 Q 42 28 40 20 Z"/>
    <!-- Feather back -->
    <path d="M 32 18 Q 28 26 30 35 Q 32 26 34 18 Z"/>
  </g>
  
  <!-- Shuttlecock body/cork -->
  <circle cx="32" cy="42" r="8" fill="#f76a01"/>
  
  <!-- Shaft -->
  <line x1="32" y1="42" x2="32" y2="20" stroke="#f76a01" stroke-width="3" stroke-linecap="round"/>
</svg>
